<p-table 
  [value]="[]" 
  [tableStyle]="{ 'min-width': '100%', 'margin-bottom': '1rem' }"
  [size]="'small'"
>
  <ng-template #header>
      <tr>  
          <th>SKU</th>
          <th>Code</th>
          <th>Name</th>
          <th>Brand</th>
          <th>Category</th>
      </tr>
  </ng-template>
  <ng-template #body let-product>
      <tr>
          <td>{{ product.code }}</td>
          <td>{{ product.name }}</td>
          <td>{{ product.category }}</td>
          <td>{{ product.quantity }}</td>
      </tr>
  </ng-template>
</p-table>
<div class="flex flex-col items-center">
  <p class="text-muted-color mb-4">No products available, you can add.</p>
  <p-button label="Add Product" size="small" />
</div>
