<div class="flex flex-col w-64 h-full bg-primary-600 dark:bg-surface-800 select-none">
  <!-- header -->
  <div class="flex flex-row justify-center items-center border-b border-primary-400 dark:border-surface-800 border-dashed h-16">
    <div class="flex flex-row items-center gap-2 text-sm">
      <div class="flex flex-col justify-center items-center bg-white dark:bg-surface-600 rounded text-primary-600 dark:text-white size-4">
        <i class='bx bxs-shopping-bag-alt'></i>
      </div>
      <h1 class="text-white font-bold">
        POS & INVENTORY APP
      </h1>
    </div>
    <div>
      <i class="bx bx-times"></i>
    </div>
  </div>
  <div class="py-4 flex-1 flex flex-col overflow-y-auto">
    <ng-scrollbar class="ngx-scrollbar" visibility="hover">
      <pos-sidebar-menu 
        [menus]="sidebar.menus()"
        (toggle)="sidebar.toggle($event)"
        (navigate)="navigate($event)"
      ></pos-sidebar-menu>
    </ng-scrollbar>
  </div>
  <div>
  </div>
</div>
<!-- templates -->
<ng-template 
  #SidebarMenuTitle 
  let-title="title"
>
  <div class="px-4 pb-1">
    <h1 class="text-blue-300 dark:text-surface-500 text-xs font-semibold">{{ title }}</h1>
  </div>
</ng-template>
