<main class="h-full flex flex-col justify-center items-center select-none">
  <section>
    <h1 class="text-3xl font-bold">Login</h1>
    <p class="text-muted-color mb-2">Welcome back, login now to proceed!</p>
    @if (store.isInvalidCredentials()) {
      <div class="my-2">
        <p-message severity="error">
          <span>
            <i class="bx bx-error"></i>
          </span>
          {{ login.message }}
        </p-message>
      </div>
    }
    <form 
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="flex flex-col gap-3"
    >
      <div class="flex flex-col gap-2">
        <label for="username" class="opacity-[0.90]">Username</label>
        <input 
          pInputText 
          id="username" 
          type="text"
          placeholder="nerdydaemon10"
          formControlName="username"
        >
      </div>
      <div class="flex flex-col gap-2">
        <label for="password" class="opacity-[0.90]">Password</label>
        <p-password
          [feedback]="false"
          [toggleMask]="true"
          fluid="true"
          inputId="password"
          placeholder="******"
          formControlName="password"
        />
      </div>
      <p-button 
        [fluid]="true"
        [loading]="login.loading"
        [disabled]="form.invalid"
        type="submit"
        label="Login"
      />
    </form>
    <pos-divider text="OR" />
    <p-button 
      [fluid]="true"
      label="Create an account"
      severity="secondary" 
    />
  </section>
</main>
